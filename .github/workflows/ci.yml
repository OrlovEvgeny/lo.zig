name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (${{ matrix.os }}, Zig ${{ matrix.zig }}, ${{ matrix.optimize }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        zig: ["0.15.0", "0.16.0"]
        optimize: [Debug, ReleaseSafe, ReleaseFast]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}
      - name: Run tests
        run: zig build test -Doptimize=${{ matrix.optimize }}
